<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Tikpul</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px; background: #f4f6f9; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; background: none; border: none; font-size: 14px; font-weight: bold; color: #666; min-width: 100px; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        video, canvas { width: 100%; border-radius: 8px; background: #000; margin-bottom: 15px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #canvas { display: none; }
        .btn-group { display: flex; gap: 10px; }
        .btn-masuk { background: #28a745; }
        .btn-pulang { background: #dc3545; }
        .status-lokasi { background: #fff3cd; color: #856404; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; font-weight: bold; display: none; }
        .form-surat { display: none; text-align: left; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px dashed #007bff; margin-top: 5px; }
        .form-surat label { font-size: 13px; font-weight: bold; color: #333; }
        
        /* Style Tambahan untuk Tabel Admin */
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Absen Dulu</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-absen', this)">Main Absen</button>
        <button class="tab-btn" onclick="switchTab('tab-izin', this)">Cuti / Izin</button>
        <button class="tab-btn" style="background: #e9ecef; color: #495057;" onclick="switchTab('tab-admin', this)">Menu Admin 🔒</button>
    </div>

    <!-- Bagian Form Input yang Diisi User (Disembunyikan saat di Tab Admin) -->
    <div id="form-karyawan-inputs">
        <select id="globalNama" required>
            <option value="" disabled selected>-- Pilih Nama Lengkap Anda --</option>
            <option value="Budi Santoso">Budi Santoso</option>
            <option value="Siti Aminah">Siti Aminah</option>
            <option value="Andi Wijaya">Andi Wijaya</option>
            <option value="Hetty Lumban">Hetty Lumban</option>
        </select>
        
        <select id="globalDepartemen" required>
            <option value="" disabled selected>-- Pilih Departemen / Divisi --</option>
            <option value="Security">Security</option>        
            <option value="Umum/Lainnya">Umum / Lainnya</option>
        </select>
    </div>

    <!-- TAB MAIN ABSEN -->
    <div id="tab-absen" class="tab-content active">
        <div id="statusLokasi" class="status-lokasi">Memeriksa lokasi GPS Anda...</div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="btn-group">
            <button class="btn-masuk" id="btnMasuk" onclick="prosesAbsen('Masuk')" disabled>Absen Masuk</button>
            <button class="btn-pulang" id="btnPulang" onclick="prosesAbsen('Pulang')" disabled>Absen Pulang</button>
        </div>
    </div>

    <!-- TAB CUTI / IZIN -->
    <div id="tab-izin" class="tab-content">
        <select id="jenisPengajuan" onchange="cekJenisPengajuan()">
            <option value="Cuti">Cuti Tahunan</option>
            <option value="Izin">Izin Keperluan</option>
            <option value="Sakit">Sakit (Butuh Surat Dokter)</option>
        </select>
        
        <div id="boxSuratDokter" class="form-surat">
            <label>Foto / Upload Surat Keterangan Dokter:</label>
            <input type="file" id="fileSuratDokter" accept="image/*" capture="environment">
        </div>

        <input type="date" id="tglMulai">
        <input type="date" id="tglSelesai">
        <textarea id="alasan" rows="3" placeholder="Alasan pengajuan secara detail..."></textarea>
        <button id="btnKirimIzin" onclick="prosesPengajuan()">Kirim Pengajuan</button>
    </div>

    <!-- TAB REKAP DATA ADMIN (BARU) -->
    <div id="tab-admin" class="tab-content">
        <div id="adminAuthBox">
            <h4>Halaman Khusus Admin</h4>
            <input type="password" id="passAdmin" placeholder="Masukkan Password Admin">
            <button onclick="loadDataRekap()">Masuk & Ambil Data</button>
        </div>
        
        <div id="adminDataBox" class="admin-box" style="display:none;">
            <h3>Rekapitulasi Kehadiran</h3>
            <button onclick="loadDataRekap()" style="background:#6c757d; font-size:12px; padding:6px; width:auto; margin-bottom:10px;">🔄 Refresh Data</button>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Divisi</th>
                            <th style="background:#28a745;">Masuk</th>
                            <th style="background:#dc3545;">Pulang</th>
                            <th style="background:#ffc107; color:black;">Cuti</th>
                            <th style="background:#17a2b8;">Izin</th>
                            <th style="background:#6f42c1;">Sakit</th>
                        </tr>
                    </thead>
                    <tbody id="tabelRekapBody">
                        <!-- Data Rekap otomatis masuk di sini via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzJhc8EUhV82Sdv-Ys8VWiMLpXazdmyOlqWQCYG54fy3lMjejyRNNPrUmctIiYqnDG-Og/exec"; 
    const KANTOR_LAT = -6.427759;  
    const KANTOR_LON = 106.760683; 
    const RADIUS_MAKSIMAL = 50;   

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusLokasi = document.getElementById('statusLokasi');
    const btnMasuk = document.getElementById('btnMasuk');
    const btnPulang = document.getElementById('btnPulang');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => alert("Browser memblokir perizinan kamera. Harap aktifkan!"));

    if (navigator.geolocation) {
        statusLokasi.style.display = "block";
        navigator.geolocation.watchPosition(cekLokasiKaryawan, errorGPS, {
            enableHighAccuracy: true,
            timeout: 10000
        });
    }

    function hitungJarak(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI/180; const phi2 = lat2 * Math.PI/180;
        const deltaPhi = (lat2-lat1) * Math.PI/180; const deltaLambda = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
    }

    function cekLokasiKaryawan(position) {
        const jarak = hitungJarak(position.coords.latitude, position.coords.longitude, KANTOR_LAT, KANTOR_LON);
        if (jarak <= RADIUS_MAKSIMAL) {
            statusLokasi.style.display = "none";
            btnMasuk.disabled = false; btnPulang.disabled = false;
        } else {
            statusLokasi.style.backgroundColor = "#f8d7da"; statusLokasi.style.color = "#721c24"; statusLokasi.style.display = "block";
            statusLokasi.innerText = `Anda di luar area kantor (${Math.round(jarak)} m). Maksimal radius: ${RADIUS_MAKSIMAL} m.`;
            btnMasuk.disabled = true; btnPulang.disabled = true;
        }
    }

    function errorGPS() {
        statusLokasi.style.display = "block";
        statusLokasi.innerText = "Gagal mengunci GPS. Pastikan fitur Lokasi HP aktif dan izin browser diberikan.";
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');

        // Sembunyikan dropdown nama & divisi kalau masuk ke halaman admin supaya bersih
        if(tabId === 'tab-admin') {
            document.getElementById('form-karyawan-inputs').style.display = 'none';
        } else {
            document.getElementById('form-karyawan-inputs').style.display = 'block';
        }
    }

    function cekJenisPengajuan() {
        const jenis = document.getElementById('jenisPengajuan').value;
        const boxSurat = document.getElementById('boxSuratDokter');
        if (jenis === "Sakit") {
            boxSurat.style.display = "block";
        } else {
            boxSurat.style.display = "none";
        }
    }

    function prosesAbsen(tipe) {
        const nama = document.getElementById('globalNama').value;
        const depar = document.getElementById('globalDepartemen').value;

        if (!nama) return alert("Silakan pilih Nama Anda terlebih dahulu!");
        if (!depar) return alert("Silakan pilih Departemen Anda terlebih dahulu!");

        const btn = tipe === 'Masuk' ? btnMasuk : btnPulang;
        const originalText = btn.innerText;
        btn.disabled = true; btn.innerText = "Processing...";

        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const fotoBase64 = canvas.toDataURL('image/jpeg', 0.6);

        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "absen", nama: nama, departemen: depar, status: tipe, foto: fotoBase64 })
        })
        .then(() => {
            alert(`Absen ${tipe} Berhasil Terkirim!`);
            btn.disabled = false; btn.innerText = originalText;
        }).catch(() => {
            alert("Gagal terhubung ke server database.");
            btn.disabled = false; btn.innerText = originalText;
        });
    }

    function prosesPengajuan() {
        const nama = document.getElementById('globalNama').value;
        const depar = document.getElementById('globalDepartemen').value;
        const jenis = document.getElementById('jenisPengajuan').value;
        const tglMulai = document.getElementById('tglMulai').value;
        const tglSelesai = document.getElementById('tglSelesai').value;
        const alasan = document.getElementById('alasan').value.trim();
        const fileInput = document.getElementById('fileSuratDokter');

        if (!nama) return alert("Silakan pilih Nama Anda terlebih dahulu!");
        if (!depar) return alert("Silakan pilih Departemen Anda terlebih dahulu!");
        if (!tglMulai || !tglSelesai || !alasan) return alert("Mohon lengkapi seluruh form pengajuan!");
        if (jenis === "Sakit" && fileInput.files.length === 0) return alert("Wajib melampirkan foto / bukti Surat Dokter!");

        const btn = document.getElementById('btnKirimIzin');
        btn.disabled = true; btn.innerText = "Mengirim...";

        const dataPayload = {
            action: "pengajuan",
            nama: nama,
            departemen: depar,
            jenis: jenis,
            tglMulai: tglMulai,
            tglSelesai: tglSelesai,
            alasan: alasan,
            suratDokter: null
        };

        if (jenis === "Sakit" && fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = function(e) {
                dataPayload.suratDokter = e.target.result;
                kirimDataKeGAS(dataPayload, btn);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            kirimDataKeGAS(dataPayload, btn);
        }
    }

    function kirimDataKeGAS(payload, btn) {
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert(`Pengajuan ${payload.jenis} Berhasil Dikirim!`);
            document.getElementById('tglMulai').value = "";
            document.getElementById('tglSelesai').value = "";
            document.getElementById('alasan').value = "";
            document.getElementById('fileSuratDokter').value = "";
            btn.disabled = false; btn.innerText = "Kirim Pengajuan";
        }).catch(() => {
            alert("Gagal mengirim data pengajuan.");
            btn.disabled = false; btn.innerText = "Kirim Pengajuan";
        });
    }

    // FUNGSI UNTUK MENAMPILKAN REKAP DATA ADMIN (BARU)
    function loadDataRekap() {
        const password = document.getElementById('passAdmin').value;
        if (!password) return alert("Masukkan password admin terlebih dahulu!");

        const tbody = document.getElementById('tabelRekapBody');
        tbody.innerHTML = "<tr><td colspan='7'>Sedang memuat dan menghitung rekap data...</td></tr>";

        // Menggunakan mode 'cors' dengan server-side response teks agar data return-nya bisa terbaca di HTML luar
        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "get_rekap", password: password })
        })
        .then(response => response.json())
        .then(res => {
            if (res.status === "success") {
                document.getElementById('adminAuthBox').style.display = 'none';
                document.getElementById('adminDataBox').style.display = 'block';
                
                tbody.innerHTML = "";
                if (res.data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='7'>Belum ada data terekam.</td></tr>";
                    return;
                }

                res.data.forEach(item => {
                    let rupaBaris = `<tr>
                        <td><b>${item.nama}</b></td>
                        <td>${item.departemen || '-'}</td>
                        <td style="color:#28a745; font-weight:bold;">${item.masuk}</td>
                        <td style="color:#dc3545; font-weight:bold;">${item.pulang}</td>
                        <td>${item.cuti}</td>
                        <td>${item.izin}</td>
                        <td>${item.sakit}</td>
                    </tr>`;
                    tbody.innerHTML += rupaBaris;
                });
            } else {
                alert(res.message);
                tbody.innerHTML = "<tr><td colspan='7'>Gagal memuat data. Password salah.</td></tr>";
            }
        })
        .catch(err => {
            // Jika Web App Google Script belum diset ke akses 'Anyone', fetch JSON langsung sering terhalang CORS. 
            // Solusi: Pastikan saat deploy ulang web app di GAS, pilih execute sebagai "Me" dan aksesnya "Anyone".
            alert("Terjadi masalah koneksi atau CORS. Pastikan setelan deploy Web App Anda sudah diatur ke 'Anyone'.");
            tbody.innerHTML = "<tr><td colspan='7'>Gagal memuat data.</td></tr>";
        });
    }
</script>
</body>
</html>
